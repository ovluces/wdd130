<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Basic Quiz Form</title>
	<link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
	<main class="box">
		<h1>✔ Basic HTML and CSS Quiz</h1>
		<form class="box">
			<div class="quiz-item box">
				<label>1. What does the acronym CSS stand for<input type="text" name="q1" id="q1"
						required></label>

			</div>
			<div class="quiz-item box">
				<label for="q2">2. How are id and class attribute selected in CSS</label>
				<textarea name="q2" id="q2"></textarea>
			</div>
			<div class="quiz-item box">
				<label for="q3">3. Whitch of the followin is a valid CSS cooment?</label>
				<select name="q3" id="q3">
					<option value="" selected disabled>Choose One...</option>
					<option value="a">A. &lt;!-- This is a comment --&gt; </option>
					<option value="b">B. /* This is a comment */</option>
					<option value="c">C. // This is a comment</option>
				</select>
			</div>
			<div class="quiz-item box">
				<label for="q4">1. What is the botton margin given this declaration</label>
				<code class="box">margin: 10px 5px 15px;</code>
				<input type="number" name="q4" id="q4">
			</div>
			<button type="submit">Submit Quiz fro Grading</button>
		</form>
	</main>
</body>

</html>
