<!-- WWR / WhiteWater Rafting Site -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ovidio J. Luces M., WhiteWater Rafting Contact Site.">
    <meta name="author" content="Ovidio J. Luces M.">
    <title>WWR / Contact Us / WhiteWater Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-splash.png" alt="WhiteWater Rafting">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us </a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero">
            <img src="images/rafting16_1024_lr.jpg" alt="WhiteWater Rafting Site">
            <h1>White Water Rafting Company</h1>
            <article>
                <p>123 Main River Street</p>
                <p>Kolob, California</p>
                <p>+1 999 999 9999</p>
                <p>info@whitewater.com</p>
            </article>
        </div>
        <div class="columns">
            <div class="columnas map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2066.1534868455747!2d-116.64660221447554!3d33.95931403043067!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80db3d64182daf11%3A0x2d76993b99ba0a91!2sWhitewater%2C%20California%2092282%2C%20EE.%20UU.!5e1!3m2!1ses!2sve!4v1781143506821!5m2!1ses!2sve"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="columnas">
                <form class="form">
                    <div class="campo-form">
                        <label for="name">Name</label>
                        <input type="text" name="name" id="name" placeholder="Placeholder">
                    </div>

                    <div class="campo-form">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Placeholder">
                    </div>
                    <div class="campo-form">
                        <label>Message Purpose</label>
                        <div class="campo-form2">

                            <label for="general"><input type="radio" id="general" name="msg_purpose"
                                  value="general">General Inquiry</label>

                            <label for="reservation"><input type="radio" id="reservation"
                                  name="msg_purpose" value="reservation">Reservation
                                Question</label>

                            <label for="website"><input type="radio" id="website" name="msg_purpose"
                                  value="website">Website Suggestion</label>

                        </div>

                    </div>

                    <div class="wide campo-form2">
                        <label for="message">Message</label>
                        <textarea name="message" id="message" placeholder="Type here"></textarea>

                    </div>
                    <div class="wide campo-form">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter" class="wide">Please
                            Subscribe me to the monthyly newsletter</label>
                    </div>


                    <button type="submit">Get in Touch!</button>

                </form>
            </div>
        </div>
        <section class="map">

        </section>
        <section>
            <h2>We Are Here to Serve You!</h2>
            <div class="figures">
                <figure>
                    <img src="images/employee1.jpg" alt="Employee 1">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Employee 2">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Employee 3">
                    <figcaption>Employee Profile</figcaption>
                </figure>

            </div>

        </section>
    </main>
    <footer>
        <p>©2026 / WhiteWater Rafting / Ovidio Luces</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.jpg" alt="Facebook Icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.jpg" alt="LinkedIn Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.jpg"
                  alt="Instagram Icon"></a>
        </nav>
    </footer>
</body>

</html>
